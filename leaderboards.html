<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharkdle Leaderboards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <!-- Firebase Analytics (optional) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
    <!-- Firebase Firestore (for leaderboard database) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#061a40,#0b3c5d);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:#071c2c;
box-shadow:0 5px 20px rgba(0,0,0,0.5);

width:100%;

}

.logo{

font-size:28px;
font-weight:800;
background:linear-gradient(135deg,#4dd0e1,#00b4d8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;

}

.nav-btn {
    background: linear-gradient(135deg, #00b4d8, #0088a0);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(0, 180, 216, 0.3);
    margin-left: 10px;
}

.nav-btn:hover {
    background: linear-gradient(135deg, #0088a0, #006080);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0, 180, 216, 0.5);
}

.nav-btn:active {
    transform: translateY(0);
}

/* CONTAINER */

.leaderboard-container{

background:rgba(11,34,51,0.95);

border-radius:20px;

margin-top:60px;

padding:40px;

width:95%;
max-width:750px;

box-shadow:0 15px 40px rgba(0,0,0,0.6);

}

/* TITLE */

h1{

text-align:center;

font-size:2.3rem;

margin-bottom:10px;

background:linear-gradient(135deg,#00b4d8,#4dd0e1);

-webkit-background-clip:text;
background-clip:text;

color:transparent;

}

/* LOADING TEXT */

.loading{

text-align:center;

color:#b3e5fc;

font-size:1.1rem;

margin-top:15px;

}

/* TABLE */

.leaderboard-table{

width:100%;

border-collapse:collapse;

margin-top:20px;

overflow-x:auto;

display:block;

}

/* HEADER */

.leaderboard-table th{

background:#071c2c;

color:#4dd0e1;

padding:12px;

font-size:1rem;

text-transform:uppercase;

letter-spacing:1px;

}

/* ROWS */

.leaderboard-table td{

padding:12px;

text-align:center;

color:white;

border-bottom:1px solid rgba(255,255,255,0.08);

}

.leaderboard-table tr{

background:#0b2233;

transition:0.2s;

}

.leaderboard-table tr:hover{

background:#0f2d44;

transform:scale(1.01);

}

/* PROFILE IMAGE */

.leaderboard-table img{

width:40px;

height:40px;

border-radius:50%;

border:2px solid #00b4d8;

object-fit:cover;

}

/* RANK TROPHIES */

.leaderboard-table span i{

font-size:1.2em;

}

/* BACK BUTTON */

.back-btn{

margin-top:30px;

background:#00b4d8;

color:white;

border:none;

border-radius:8px;

padding:12px 28px;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.2s;

width:100%;

}

.back-btn:hover{

background:#0096c7;

transform:scale(1.03);

}

/* POPUP */

#leaderboard-popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.75);

z-index:1000;

justify-content:center;
align-items:center;

}

#leaderboard-popup div{

background:#0b2233;

padding:35px;

border-radius:12px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,0.7);

}

/* MOBILE */

@media(max-width:768px){

.navbar {
    padding: 15px 20px;
    gap: 10px;
}

.logo {
    font-size: 22px;
    flex-shrink: 0;
}

.navbar > div {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.nav-btn {
    padding: 6px 6px;
    font-size: 9px;
    margin-left: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    line-height: 1;
}

.nav-btn i {
    font-size: 14px;
}

.nav-btn span {
    font-size: 8px;
}

.leaderboard-container{
    padding:30px;
    margin-top:40px;
    width:98%;
}

h1{
    font-size:2rem;
}

.leaderboard-table th,
.leaderboard-table td{
    padding:10px;
    font-size:0.9rem;
}

.leaderboard-table img{
    width:36px;
    height:36px;
}

.back-btn{
    padding:10px 24px;
    font-size:15px;
}

}

@media(max-width:600px){

.navbar {
    padding: 10px 12px;
    flex-direction: row;
    align-items: center;
    gap: 6px;
}

.logo {
    font-size: 20px;
    flex-shrink: 0;
}

.navbar > div {
    display: flex;
    flex-direction: row;
    gap: 3px;
    flex-wrap: wrap;
    min-width: 0;
}

.nav-btn {
    padding: 4px 6px;
    font-size: 8px;
    margin-left: 0;
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    line-height: 1;
}

.nav-btn i {
    font-size: 12px;
}

.nav-btn span {
    font-size: 8px;
}

.leaderboard-container{
    padding:20px;
    margin-top:20px;
    width:96%;
    max-width:100%;
}

h1{
    font-size:1.6rem;
    margin-bottom:8px;
}

.leaderboard-table th,
.leaderboard-table td{
    padding:8px 4px;
    font-size:0.8rem;
}

.leaderboard-table img{
    width:32px;
    height:32px;
}

.back-btn{
    margin-top:20px;
    padding:10px 16px;
    font-size:14px;
}

#leaderboard-popup div{
    padding:25px;
    margin:15px;
}

}

@media(max-width:400px){

.navbar {
    flex-direction: row;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
    justify-content: space-between;
}

.logo {
    font-size: 18px;
    flex-shrink: 0;
}

.navbar > div {
    display: flex;
    flex-direction: row;
    gap: 3px;
    flex-wrap: nowrap;
    min-width: 0;
}

.nav-btn {
    padding: 6px 8px;
    min-height: 36px;
    font-size: 9px;
    margin-left: 0;
    margin-bottom: 0;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
}

.leaderboard-container{
    padding:15px;
    margin-top:15px;
    width:100%;
}

h1{
    font-size:1.3rem;
}

.leaderboard-table th,
.leaderboard-table td{
    padding:6px 2px;
    font-size:0.75rem;
}

.leaderboard-table img{
    width:28px;
    height:28px;
}

.back-btn{
    margin-top:15px;
    padding:10px 12px;
    font-size:13px;
    min-height:40px;
}

#leaderboard-popup div{
    padding:20px 15px;
    max-width:calc(100% - 30px);
    margin:15px auto;
}

}

    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">🦈 Sharkdle</div>
        <div>
            <button onclick="navigate('index.html')" class="nav-btn" title="Home"><i class="fas fa-home"></i><span>Home</span></button>
            <button onclick="navigate('library.html')" class="nav-btn" title="Library"><i class="fas fa-fish"></i><span>Library</span></button>
            <button onclick="navigate('sharkpass.html')" class="nav-btn" title="Shark Pass"><i class="fas fa-id-card"></i><span>Pass</span></button>
            <button onclick="navigate('achievements.html')" class="nav-btn" title="Achievements"><i class="fas fa-trophy"></i><span>Achieve</span></button>
        </div>
    </header>
    <div class="leaderboard-container">
        <h1>🏆 Sharkdle Global Leaderboards</h1>
        <div id="leaderboard-loading" class="loading">Loading leaderboard...</div>
        <table class="leaderboard-table" id="leaderboard-table" style="display:none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Profile</th>
                    <th>Username</th>
                    <th>Wins</th>
                    <th>Level</th>
                    <th>Streak</th>
                    <th>Games</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Leaderboard rows will be inserted here -->
            </tbody>
        </table>
        <button class="back-btn" onclick="window.location.href='index.html'">
            ← Back to Main Menu
        </button>
    </div>

    <!-- Popup Modal for Leaderboard Error -->
    <div id="leaderboard-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(10,36,99,0.75);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#1b263b;padding:32px 24px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-width:340px;margin:auto;text-align:center;">
            <h2 style="color:#fff;margin-bottom:12px;font-size:1.3rem;">Leaderboard Unavailable</h2>
            <p style="color:#b3e5fc;font-size:1.05rem;margin-bottom:18px;">Sorry, the leaderboard is currently not working.<br>Please try again later.</p>
            <button onclick="closeLeaderboardPopup()" style="background:linear-gradient(135deg,#3e92cc,#2a9d8f);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:1rem;font-weight:600;cursor:pointer;">OK</button>
        </div>
    </div>
    <script>
        // Navigation helper function
        function navigate(page) {
            window.location.href = page;
        }

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAS9l8O1jRMafPt3r0lF6mqjr2-gl-EbZB0",
            authDomain: "sharkdle-leaderboard.firebaseapp.com",
            projectId: "sharkdle-leaderboard",
            storageBucket: "sharkdle-leaderboard.firebasestorage.app",
            messagingSenderId: "429123174628",
            appId: "1:429123174628:web:42ae9baed69c4b087c2cf1",
            measurementId: "G-HV5FFNKM5C"
        };
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        // if (firebase.analytics) {
        //     firebase.analytics();
        // }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Check for user profile in localStorage first (for immediate cross-domain detection)
        let currentUserUID = null;
        let currentUsername = null;
        let currentUserEmail = null;
        const profileData = localStorage.getItem("userProfile");
        if (profileData) {
            try {
                const profile = JSON.parse(profileData);
                currentUsername = profile.username;
                currentUserEmail = profile.email;
            } catch (e) {
                console.log("", e);
            }
        }
        
        // Wait for auth state before loading leaderboard
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserUID = user.uid;
                currentUserEmail = user.email;
                console.log("Auth state loaded. Current user UID:", user.uid, "Email:", user.email);
            }
            // Small delay to ensure Firebase auth state is fully ready
            setTimeout(() => {
                loadLeaderboard();
            }, 300);
        });

        // Fetch leaderboard data from Firestore
        function showLeaderboardPopup() {
            document.getElementById('leaderboard-popup').style.display = 'flex';
        }
        function closeLeaderboardPopup() {
            document.getElementById('leaderboard-popup').style.display = 'none';
        }

        async function loadLeaderboard() {
            const loadingDiv = document.getElementById('leaderboard-loading');
            const table = document.getElementById('leaderboard-table');
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            try {
                // Get top 25 users by wins
                const snapshot = await db.collection('userStats')
                    .orderBy('wins', 'desc')
                    .limit(25)
                    .get();
                if (snapshot.empty) {
                    loadingDiv.textContent = 'No leaderboard data yet.';
                    return;
                }
                
                let rank = 1;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const tr = document.createElement('tr');
                    
                    // Check if this is the current user - use multiple methods including cached profile
                    const isCurrentUser = (currentUserUID && doc.id === currentUserUID) || 
                                         (currentUserEmail && data.email && data.email === currentUserEmail) ||
                                         (currentUsername && data.username && data.username.toLowerCase() === currentUsername.toLowerCase()) ||
                                         (auth.currentUser && (
                                            doc.id === auth.currentUser.uid || 
                                            data.uid === auth.currentUser.uid ||
                                            data.email === auth.currentUser.email
                                         ));
                    
                    // Profile picture logic
                    let profilePicPath = 'images/pfp/shark1.png';
                    if (data.profilePic) {
                        if (data.profilePic.startsWith('images/')) {
                            profilePicPath = data.profilePic;
                        } else if (data.profilePic.includes('/')) {
                            profilePicPath = `images/${data.profilePic}`;
                        } else {
                            profilePicPath = `images/pfp/${data.profilePic}`;
                        }
                    }
                    const profilePicImg = `<img src="${profilePicPath}" alt="Profile" style="width:38px;height:38px;border-radius:50%;border:2px solid #3e92cc;background:#18304a;object-fit:cover;box-shadow:0 1px 4px rgba(30,41,59,0.12);">`;
                    const username = data.username ? data.username : 'Anonymous';
                    
                    let rankCell = '';
                    if (rank === 1) {
                        rankCell = `<span style="color:#FFD700;">🏆</span>`;
                    } else if (rank === 2) {
                        rankCell = `<span style="color:#C0C0C0;">🥈</span>`;
                    } else if (rank === 3) {
                        rankCell = `<span style="color:#CD7F32;">🥉</span>`;
                    } else {
                        rankCell = rank;
                    }
                    
                    let titleLine = '';
                    if (data.selectedTitle) {
                        titleLine = `<div style="font-size:0.85em;color:#fdd835;">${data.selectedTitle}</div>`;
                    }
                    
                    // Add arrow after username if current user
                    let usernameDisplay = `${username}`;
                    if (isCurrentUser) {
                        usernameDisplay = `${username} <span style="color:#00bcd4; font-size: 1.2em;">←</span>`;
                    }
                    usernameDisplay = `${usernameDisplay}${titleLine}`;
                    if (isCurrentUser) {
                        usernameDisplay = `${usernameDisplay} <span style="color:#00b4d8; font-weight: bold;">(You)</span>`;
                    }
                    
                    // Highlight row for current user
                    if (isCurrentUser) {
                        tr.style.backgroundColor = 'rgba(0, 188, 212, 0.15)';
                    }
                    
                    tr.innerHTML = `
                        <td>${rankCell}</td>
                        <td>${profilePicImg}</td>
                        <td>${usernameDisplay}</td> 
                        <td>${data.wins || 0}</td>
                        <td>${data.currentLevel || 0}</td>
                        <td>${data.currentStreak || 0}</td>
                        <td>${data.gamesPlayed || 0}</td>
                    `;
                    tbody.appendChild(tr);
                    rank++;
                });
                loadingDiv.style.display = 'none';
                table.style.display = '';
            } catch (err) {
                loadingDiv.textContent = 'Failed to load leaderboard.';
                showLeaderboardPopup();
                console.error(err);
            }
        }
    </script>
</body>
</html>
