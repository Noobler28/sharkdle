<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharkdle - Options</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2463 60%, #1b9aaa 100%);
            /* Add a subtle pattern overlay */
            background-image: linear-gradient(135deg, rgba(10, 36, 99, 0.8) 0%, rgba(27, 154, 170, 0.5) 100%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.07)" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            background-position: bottom;
            background-repeat: no-repeat;
            color: #E2E8F0;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: row;
            /* Add more space around the main content */
            padding: 36px 0 36px 0;
        }
        .sidebar {
            width: 350px;
            min-width: 240px;
            background: rgba(30, 41, 59, 0.98);
            border-radius: 0 40px 40px 0;
            box-shadow: 2px 0 40px 8px rgba(30,41,59,0.22);
            padding: 64px 36px 36px 36px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            margin-left: 32px;
            margin-right: 32px;
        }
        .sidebar::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #3e92cc, #1b9aaa, #2a9d8f);
            border-radius: 0 0 12px 12px;
        }
        .sidebar h1 {
            color: #2a9d8f;
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3e92cc, #2a9d8f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 48px;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 8px rgba(30,41,59,0.18);
            text-align: left;
        }
        .tabs {
            display: flex;
            flex-direction: column;
            gap: 28px;
            width: 100%;
            margin-bottom: 36px;
        }
        .tab-btn {
            background: linear-gradient(135deg, #3e92cc 80%, #1b9aaa 100%);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 22px 32px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s, transform 0.15s, box-shadow 0.15s;
            text-align: left;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 16px rgba(30,41,59,0.13);
            letter-spacing: 0.5px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #1b9aaa 70%, #2a9d8f 100%);
            color: #fff;
            box-shadow: 0 10px 32px rgba(62,146,204,0.22);
            z-index: 2;
            transform: scale(1.10);
            border: 2.5px solid #2a9d8f;
        }
        .tab-btn:hover {
            background: linear-gradient(135deg, #1b9aaa, #3e92cc 80%);
            color: #fff;
            transform: scale(1.08);
            box-shadow: 0 8px 24px rgba(42,157,143,0.18);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 64px 7vw 48px 7vw;
            min-width: 0;
            background: none;
        }
        .tab-content {
            display: none;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            background: rgba(51, 65, 85, 0.98);
            border-radius: 40px;
            box-shadow: 0 18px 64px 8px rgba(30,41,59,0.22), 0 2px 12px rgba(42,157,143,0.10);
            padding: 64px 60px 48px 60px;
            margin-bottom: 48px;
            border: 3.5px solid #3e92cc33;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.3s;
            backdrop-filter: blur(8px) saturate(1.2);
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tab-content h2 {
            color: #2a9d8f;
            font-size: 2.1rem;
            margin-bottom: 38px;
            font-weight: 900;
            letter-spacing: 1.2px;
            text-shadow: 0 2px 12px rgba(30,41,59,0.13);
        }
        .option-btn {
            background: linear-gradient(135deg, #3e92cc, #1b9aaa);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 18px 36px;
            font-size: 1.18rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.18s, transform 0.15s, box-shadow 0.15s;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(30,41,59,0.13);
        }
        .option-btn:hover {
            background: linear-gradient(135deg, #1b9aaa, #2a9d8f);
            transform: scale(1.07);
            box-shadow: 0 10px 32px rgba(42,157,143,0.18);
        }
        .slider-container {
            margin-bottom: 28px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #b3e5fc;
            font-size: 1.13rem;
            font-weight: 600;
        }
        input[type="range"] {
            width: 100%;
        }
        .back-btn {
            background: linear-gradient(90deg, #e76f51, #f4a261);
            color: #fff;
            font-weight: 900;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(231,111,81,0.18);
            padding: 16px 36px;
            font-size: 1.18rem;
            border: none;
            margin-top: 32px;
            transition: background 0.18s, box-shadow 0.18s, transform 0.18s;
        }
        .back-btn:hover {
            background: linear-gradient(90deg, #d9534f, #f4a261);
            box-shadow: 0 16px 48px rgba(231,111,81,0.28);
            transform: scale(1.09);
        }
        /* --- Account Section Enhancements --- */
        #firebase-auth-section {
            display: flex;
            flex-direction: row;
            gap: 56px;
            align-items: flex-start;
            margin-bottom: 32px;
        }
        .account-card {
            background: linear-gradient(120deg, rgba(62,146,204,0.22) 60%, rgba(42,157,143,0.15) 100%);
            border-radius: 36px;
            box-shadow: 0 18px 64px 8px rgba(62,146,204,0.18), 0 2px 12px rgba(42,157,143,0.10);
            padding: 56px 44px 40px 44px;
            min-width: 340px;
            max-width: 440px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid #3e92cc44;
            position: relative;
            margin-bottom: 28px;
            transition: box-shadow 0.22s, background 0.22s, border 0.18s, transform 0.18s;
        }
        .account-card:hover {
            box-shadow: 0 24px 80px 12px rgba(62,146,204,0.22), 0 4px 16px rgba(42,157,143,0.13);
            transform: scale(1.03);
        }
        .account-avatar {
            width: 108px !important;
            height: 108px !important;
            border-radius: 50%;
            border: 5px solid #2a9d8f;
            box-shadow: 0 12px 48px rgba(42,157,143,0.18);
            margin-bottom: 18px;
            background: #fff;
            transition: border 0.18s, box-shadow 0.18s, transform 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .account-avatar img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: none;
            box-shadow: none;
        }
        .account-avatar img:hover {
            border: none;
            box-shadow: 0 16px 48px rgba(244,162,97,0.22);
            transform: scale(1.10);
        }
        .account-email {
            color: #2a9d8f;
            font-weight: 900;
            font-size: 1.23rem;
            margin-bottom: 10px;
            word-break: break-all;
            letter-spacing: 0.7px;
        }
        .account-status {
            color: #b3e5fc;
            font-size: 1.09rem;
            margin-bottom: 24px;
            font-weight: 700;
        }
        .account-actions {
            display: flex;
            gap: 18px;
            margin-top: 16px;
        }
        .account-actions .option-btn {
            padding: 14px 28px;
            font-size: 1.13rem;
        }
        /* Profile Pic Selection Card */
        .profile-pic-card {
            background: linear-gradient(120deg, rgba(62,146,204,0.13) 60%, rgba(42,157,143,0.10) 100%);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(62,146,204,0.13), 0 2px 8px rgba(42,157,143,0.08);
            padding: 36px 24px 28px 24px;
            max-width: 420px;
            margin: 36px auto 0 auto;
            border: 2px solid #3e92cc33;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .profile-pic-card h3 {
            color: #2a9d8f;
            font-size: 1.18rem;
            font-weight: 800;
            margin-bottom: 18px;
            letter-spacing: 0.7px;
        }
        .profile-pic-divider {
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, #3e92cc33, #2a9d8f33);
            border-radius: 2px;
            margin-bottom: 18px;
        }
        #options-profile-pic-list {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 0;
        }
        #options-profile-pic-list .profile-pic-option {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #3e92cc;
            box-shadow: 0 4px 16px rgba(30,41,59,0.13);
            cursor: pointer;
            transition: border 0.18s, box-shadow 0.18s, transform 0.18s, filter 0.18s;
            background: #fff;
            object-fit: cover;
            margin-bottom: 0;
        }
        #options-profile-pic-list .profile-pic-option.selected,
        #options-profile-pic-list .profile-pic-option:hover {
            border: 5px solid #f4a261 !important;
            box-shadow: 0 16px 48px rgba(244,162,97,0.28);
            transform: scale(1.13) rotate(-2deg);
            filter: brightness(1.08) saturate(1.2);
            z-index: 2;
        }
        /* Auth Form Card (Signed Out) */
        .auth-form-card {
            background: linear-gradient(120deg, rgba(62,146,204,0.13) 60%, rgba(42,157,143,0.10) 100%);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(62,146,204,0.13), 0 2px 8px rgba(42,157,143,0.08);
            padding: 36px 32px 32px 32px;
            max-width: 420px;
            margin: 0 auto 0 auto;
            border: 2px solid #3e92cc33;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .auth-form-card h3 {
            color: #2a9d8f;
            font-size: 1.18rem;
            font-weight: 800;
            margin-bottom: 18px;
            letter-spacing: 0.7px;
        }
        .auth-form-divider {
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, #3e92cc33, #2a9d8f33);
            border-radius: 2px;
            margin-bottom: 18px;
        }
        #auth-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        #auth-form input[type="email"],
        #auth-form input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            border-radius: 12px;
            border: 2px solid #3e92cc;
            font-size: 1.13rem;
            background: rgba(30,41,59,0.13);
            color: #2a9d8f;
            font-weight: 600;
            margin-bottom: 8px;
            transition: border 0.18s, box-shadow 0.18s;
        }
        #auth-form input[type="email"]:focus,
        #auth-form input[type="password"]:focus {
            border: 2.5px solid #2a9d8f;
            outline: none;
            box-shadow: 0 2px 8px rgba(42,157,143,0.13);
        }
        .auth-btn-row {
            display: flex;
            gap: 16px;
            width: 100%;
            justify-content: center;
            margin-bottom: 0;
        }
        #auth-form .option-btn {
            padding: 12px 24px;
            font-size: 1.08rem;
            margin-bottom: 0;
        }
        #forgot-password-link {
            color: #3e92cc;
            font-size: 1.01rem;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 2px;
            margin-bottom: 0;
            transition: color 0.18s;
        }
        #forgot-password-link:hover {
            color: #2a9d8f;
        }
        #auth-msg {
            min-height: 1.2em;
            font-size: 1.05em;
            margin-top: 4px;
            color: #e76f51;
            text-align: center;
            font-weight: 600;
        }
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                padding: 0;
            }
            .sidebar {
                width: 100%;
                min-width: 0;
                flex-direction: row;
                align-items: flex-start;
                padding: 24px 2vw 24px 2vw;
                box-shadow: none;
                border-radius: 0 0 40px 40px;
                margin: 0 0 24px 0;
            }
            .tabs {
                flex-direction: row;
                gap: 12px;
                margin-bottom: 0;
            }
            .tab-btn {
                padding: 14px 12px;
                font-size: 1.08rem;
            }
            .main-content {
                padding: 24px 2vw 24px 2vw;
            }
            .tab-content {
                padding: 24px 2vw 24px 2vw;
                border-radius: 24px;
            }
            #firebase-auth-section {
                flex-direction: column;
                gap: 24px;
                align-items: stretch;
                margin-bottom: 18px;
            }
            .account-card, #auth-form {
                min-width: 0;
                max-width: 100%;
                width: 100%;
                padding: 32px 12px 24px 12px;
                border-radius: 18px;
            }
            .account-avatar {
                width: 72px !important;
                height: 72px !important;
            }
            .account-avatar img {
                width: 64px;
                height: 64px;
            }
            #options-profile-pic-list .profile-pic-option {
                width: 54px;
                height: 54px;
            }
            #options-username-input {
                min-width: 120px;
                font-size: 1rem;
                padding: 10px 8px;
            }
        }
    </style>
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <!-- Firebase Auth (for user authentication) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <!-- Firebase Firestore (for leaderboard storage) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="sidebar">
        <h1>Options</h1>
        <div class="tabs">
            <button class="tab-btn active" id="tab-btn-account" onclick="showTab('account')"><i class="fas fa-user"></i> Account</button>
            <button class="tab-btn" id="tab-btn-settings" onclick="showTab('settings')"><i class="fas fa-cog"></i> Settings</button>
            <button class="tab-btn" id="tab-btn-gameplay" onclick="showTab('gameplay')"><i class="fas fa-gamepad"></i> Gameplay</button>
        </div>
        <button class="back-btn" onclick="navigateTo('index.html')">
            <i class="fas fa-arrow-left"></i> Back to Main Menu
        </button>
    </div>
    <div class="main-content">
        <div class="tab-content active" id="tab-content-account">
            <h2>Account</h2>
            <div id="firebase-auth-section">
                <div class="account-card" id="auth-user-info" style="display:none;">
                    <div class="account-avatar"><img id="options-profile-pic" src="images/pfp/shark1.png" alt="Profile Picture" style="width:64px;height:64px;border-radius:50%;border:3px solid #2a9d8f;box-shadow:0 2px 8px rgba(62,146,204,0.18);cursor:pointer;"></div>
                    <div class="account-email" id="auth-user-email"></div>
                    <div class="account-status">Signed in</div>
                    <div style="width:100%;margin:18px 0 0 0;text-align:center;">
                        <h3 style="color:#2a9d8f;font-size:1.1rem;margin-bottom:10px;">Change Account Name</h3>
                        <form id="options-username-form" style="display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;">
                            <input id="options-username-input" type="text" maxlength="16" placeholder="Enter new name" style="padding:10px 14px;border-radius:8px;border:1.5px solid #3e92cc;font-size:1.08rem;min-width:160px;">
                            <button type="submit" class="option-btn" style="padding:10px 18px;font-size:1rem;"><i class="fas fa-save"></i> Save</button>
                        </form>
                        <div id="options-username-msg" style="min-height:1.2em;font-size:0.97em;margin-top:2px;"></div>
                    </div>
                    <div class="account-actions" style="margin-top:24px;">
                        <button class="option-btn" id="signout-btn" onclick="signOutUser()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                    </div>
                </div>
                <div class="auth-form-card">
                    <h3>Sign In or Create Account</h3>
                    <div class="auth-form-divider"></div>
                    <form id="auth-form">
                        <input id="auth-email" type="email" placeholder="Email">
                        <input id="auth-password" type="password" placeholder="Password">
                        <div class="auth-btn-row">
                            <button type="button" class="option-btn" onclick="signInUser()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
                            <button type="button" class="option-btn" onclick="signUpUser()"><i class="fas fa-user-plus"></i> Sign Up</button>
                        </div>
                        <a href="#" id="forgot-password-link">Forgot Password?</a>
                        <div id="auth-msg"></div>
                    </form>
                </div>
                <div style="margin-top:24px;text-align:center;">
                    <div class="profile-pic-card">
                        <h3>Change Profile Picture</h3>
                        <div class="profile-pic-divider"></div>
                        <div id="options-profile-pic-list"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-content" id="tab-content-settings">
            <h2>Settings</h2>
            <button class="option-btn" onclick="toggleTheme()">
                <i class="fas fa-adjust"></i> Toggle Theme
            </button>
            <div class="slider-container">
                <label for="music-slider">Music Volume</label>
                <input type="range" id="music-slider" min="0" max="100" value="50" oninput="updateMusicVolume(this.value)">
            </div>
            <div class="slider-container">
                <label for="sound-slider">Sound Effects Volume</label>
                <input type="range" id="sound-slider" min="0" max="100" value="50" oninput="updateSoundVolume(this.value)">
            </div>
        </div>
        <div class="tab-content" id="tab-content-gameplay">
            <h2>Gameplay</h2>
            <button class="option-btn" onclick="resetStats()">
                <i class="fas fa-redo"></i> Reset Stats
            </button>
        </div>
    </div>
    <script>
        function navigateTo(url) {
            window.location.href = url;
        }
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById('tab-btn-' + tab).classList.add('active');
            document.getElementById('tab-content-' + tab).classList.add('active');
        }
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-mode');
            localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
        }
        function updateMusicVolume(value) {
            localStorage.setItem('musicVolume', value);
        }
        function updateSoundVolume(value) {
            localStorage.setItem('soundVolume', value);
        }
        function resetStats() {
            if (confirm("Are you sure you want to reset your stats? This action cannot be undone.")) {
                localStorage.clear();
                alert("Stats have been reset!");
            }
        }
        // Firebase config and init
        const firebaseConfig = {
            apiKey: "AIzaSyAS9l8O1jRMafPt3r0lF6mqjr2-gl-EbZ0",
            authDomain: "sharkdle-leaderboard.firebaseapp.com",
            projectId: "sharkdle-leaderboard",
            storageBucket: "sharkdle-leaderboard.appspot.com",
            messagingSenderId: "429123174628",
            appId: "1:429123174628:web:42ae9baed69c4b087c2cf1",
            measurementId: "G-HV5FFNKM5C"
        };
        if (window.firebase && (!firebase.apps || !firebase.apps.length)) {
            firebase.initializeApp(firebaseConfig);
        }
        // Initialize Firestore
        let db;
        if (window.firebase && firebase.firestore) {
            db = firebase.firestore();
        }
        // Helper to update leaderboard entry
        function updateLeaderboardProfile() {
            const user = firebase.auth().currentUser;
            if (user && db) {
                db.collection('leaderboards').doc(user.uid).set({
                    displayName: user.displayName || '',
                    photoURL: user.photoURL || '',
                    email: user.email || '',
                    updated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            }
        }
        // Firebase Auth logic
        function updateAuthUI() {
            const user = firebase.auth().currentUser;
            const userInfo = document.getElementById('auth-user-info');
            const userEmail = document.getElementById('auth-user-email');
            const signoutBtn = document.getElementById('signout-btn');
            const authFormCard = document.querySelector('.auth-form-card');
            if (user) {
                userInfo.style.display = '';
                userEmail.textContent = `Signed in as: ${user.email}`;
                signoutBtn.style.display = '';
                if (authFormCard) authFormCard.style.display = 'none';
            } else {
                userInfo.style.display = 'none';
                signoutBtn.style.display = 'none';
                if (authFormCard) authFormCard.style.display = '';
            }
        }
        function signInUser() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const msg = document.getElementById('auth-msg');
            msg.textContent = '';
            if (!email || !password) {
                msg.textContent = 'Please enter both email and password.';
                msg.style.color = '#e76f51';
                return;
            }
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => {
                    // Sync displayName and photoURL to localStorage/UI
                    const user = firebase.auth().currentUser;
                    if (user) {
                        if (user.displayName) {
                            localStorage.setItem('sharkdle-username', user.displayName);
                            loadOptionsUsername();
                        }
                        if (user.photoURL) {
                            const pic = user.photoURL.split('/').pop();
                            localStorage.setItem('profilePic', pic);
                            renderOptionsProfilePics();
                        }
                        updateLeaderboardProfile();
                    }
                    msg.textContent = 'Signed in successfully!';
                    msg.style.color = '#2a9d8f';
                    updateAuthUI();
                })
                .catch(error => {
                    msg.textContent = error.message;
                    msg.style.color = '#e76f51';
                });
        }
        function signUpUser() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const msg = document.getElementById('auth-msg');
            msg.textContent = '';
            if (!email || !password) {
                msg.textContent = 'Please enter both email and password.';
                msg.style.color = '#e76f51';
                return;
            }
            // Use current localStorage name and profilePic, or defaults
            const username = localStorage.getItem('sharkdle-username') || 'Sharkdle User';
            const profilePic = localStorage.getItem('profilePic') || 'shark1.png';
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(() => {
                    const user = firebase.auth().currentUser;
                    if (user) {
                        user.updateProfile({
                            displayName: username,
                            photoURL: window.location.origin + '/images/pfp/' + profilePic
                        }).then(() => {
                            updateLeaderboardProfile();
                            msg.textContent = 'Account created! You are now signed in.';
                            msg.style.color = '#2a9d8f';
                            updateAuthUI();
                        });
                    }
                })
                .catch(error => {
                    msg.textContent = error.message;
                    msg.style.color = '#e76f51';
                });
        }
        function signOutUser() {
            firebase.auth().signOut().then(() => {
                updateAuthUI();
                document.getElementById('auth-msg').textContent = 'Signed out.';
                document.getElementById('auth-msg').style.color = '#e76f51';
            });
        }
        // Profile Picture Selection in Options
        function renderOptionsProfilePics() {
            const picList = document.getElementById('options-profile-pic-list');
            if (!picList) return;
            const pics = ['shark1.png','shark2.png','shark3.png','shark4.png','shark5.png'];
            picList.innerHTML = '';
            const current = localStorage.getItem('profilePic') || 'shark1.png';
            pics.forEach(pic => {
                const img = document.createElement('img');
                img.src = `images/pfp/${pic}`;
                img.alt = pic;
                img.className = 'profile-pic-option' + (pic === current ? ' selected' : '');
                img.setAttribute('data-pic', pic);
                img.style.width = '48px';
                img.style.height = '48px';
                img.style.borderRadius = '50%';
                img.style.border = pic === current ? '3px solid #f4a261' : '3px solid #3e92cc';
                img.style.cursor = 'pointer';
                img.style.transition = 'border 0.18s, box-shadow 0.18s, transform 0.18s';
                img.addEventListener('click', function() {
                    setProfilePic(pic);
                    renderOptionsProfilePics();
                    // Also update the preview in the account card
                    const preview = document.getElementById('options-profile-pic');
                    if (preview) preview.src = `images/pfp/${pic}`;
                });
                picList.appendChild(img);
            });
            // Update preview
            const preview = document.getElementById('options-profile-pic');
            if (preview) preview.src = `images/pfp/${current}`;
        }
        function setProfilePic(pic) {
            localStorage.setItem('profilePic', pic);
            const preview = document.getElementById('options-profile-pic');
            if (preview) {
                preview.src = `images/pfp/${pic}`;
                preview.style.border = '3px solid #f4a261';
            }
            // If signed in, update Firebase photoURL and leaderboard
            const user = firebase.auth().currentUser;
            if (user) {
                user.updateProfile({ photoURL: window.location.origin + '/images/pfp/' + pic }).then(() => {
                    updateLeaderboardProfile();
                });
            }
        }
        function setOptionsUsername(name) {
            localStorage.setItem('sharkdle-username', name);
            // Update sidebar if open in main menu
            if (window.parent && window.parent !== window && window.parent.document) {
                const sidebarUsername = window.parent.document.getElementById('sidebar-username');
                if (sidebarUsername) sidebarUsername.textContent = name;
            }
            // If signed in, update Firebase displayName and leaderboard
            const user = firebase.auth().currentUser;
            if (user) {
                user.updateProfile({ displayName: name }).then(() => {
                    updateLeaderboardProfile();
                });
            }
        }
        function loadOptionsUsername() {
            const input = document.getElementById('options-username-input');
            if (input) input.value = localStorage.getItem('sharkdle-username') || '';
        }
        document.addEventListener('DOMContentLoaded', function() {
            // Set theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            }
            // Set sliders
            const savedMusicVolume = localStorage.getItem('musicVolume') || 50;
            const savedSoundVolume = localStorage.getItem('soundVolume') || 50;
            document.getElementById('music-slider').value = savedMusicVolume;
            document.getElementById('sound-slider').value = savedSoundVolume;
            // Firebase Auth state change
            if (window.firebase) {
                firebase.auth().onAuthStateChanged(function() {
                    updateAuthUI();
                });
            }
            // Forgot password
            const forgotLink = document.getElementById('forgot-password-link');
            if (forgotLink) {
                forgotLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    var email = document.getElementById('auth-email').value.trim();
                    var msg = document.getElementById('auth-msg');
                    if (!email) {
                        msg.textContent = 'Enter your email above to reset password.';
                        msg.style.color = '#e76f51';
                        return;
                    }
                    firebase.auth().sendPasswordResetEmail(email)
                        .then(function() {
                            msg.textContent = 'Password reset email sent! Check your inbox.';
                            msg.style.color = '#2a9d8f';
                        })
                        .catch(function(error) {
                            msg.textContent = error.message;
                            msg.style.color = '#e76f51';
                        });
                });
            }
            renderOptionsProfilePics();
            loadOptionsUsername();
            const form = document.getElementById('options-username-form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const input = document.getElementById('options-username-input');
                    const msg = document.getElementById('options-username-msg');
                    let username = input.value.trim();
                    if (!username) {
                        msg.textContent = 'Name cannot be empty.';
                        msg.style.color = '#e76f51';
                        return;
                    }
                    if (username.length < 3 || username.length > 16 || /[^a-zA-Z0-9_\-]/.test(username)) {
                        msg.textContent = 'Name must be 3-16 letters/numbers, no spaces.';
                        msg.style.color = '#e76f51';
                        return;
                    }
                    setOptionsUsername(username);
                    msg.textContent = 'Account name updated!';
                    msg.style.color = '#2a9d8f';
                });
            }
        });
    </script>
</body>
</html>
