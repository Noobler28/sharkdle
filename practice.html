<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sharkdle - Practice</title>

<link rel="stylesheet" href="infinite.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

</head>


<body>

<header class="topbar">

<h1>🦈 Sharkdle - Practice</h1>

</header>


<div class="game-container">

<!-- INPUT -->

<div class="input-panel">

<div style="position: relative;">
<input id="sharkGuess" placeholder="Enter shark name..." autocomplete="off">
<div id="suggestions" class="suggestions-dropdown"></div>
</div>

<button id="guessBtn">Guess</button>

<div id="attempts-left">Keep guessing until you find it!</div>

</div>


<!-- CURRENT GUESSES -->

<div id="guesses"></div>

<div id="message"></div>

</div>

<button id="show-results-btn" onclick="document.getElementById('win-lose-screen').style.display='block'; document.getElementById('show-results-btn').style.display='none';" style="display: none; position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; background: #00bcd4; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.3s; z-index: 999;">📋 Show Results</button>

<div id="win-lose-screen"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="sharks.js"></script>
<script src="script.js"></script>
<script src="achievements.js"></script>
<script src="practice.js"></script>

</body>

</html>
