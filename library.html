<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharkdle Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #061a40, #0b3c5d, #0a1f2e);
            margin: 0;
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(77, 208, 225, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 180, 216, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(7, 28, 44, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(77, 208, 225, 0.1);
            position: relative;
            z-index: 100;
        }
        .navbar-logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #4dd0e1, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-btn {
            background: linear-gradient(135deg, #00b4d8, #0088a0);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 180, 216, 0.3);
            margin-left: 10px;
        }
        .nav-btn:hover {
            background: linear-gradient(135deg, #0088a0, #006080);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 180, 216, 0.5);
        }
        .nav-btn:active {
            transform: translateY(0);
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .navbar a:hover {
            color: #4dd0e1;
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #4dd0e1, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 40px 0 10px 0;
            font-size: 2.8em;
            font-weight: 800;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 1;
        }
        /* SEARCH BAR */
        .search-container {
            display: flex;
            justify-content: center;
            margin: 30px 0 40px 0;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }
        .search-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            align-items: center;
            background: rgba(11, 34, 51, 0.6);
            border: 2px solid #00b4d8;
            border-radius: 8px;
            padding: 12px 18px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .search-bar:focus-within {
            border-color: #4dd0e1;
            box-shadow: 0 0 20px rgba(77, 208, 225, 0.4);
            background: rgba(11, 34, 51, 0.8);
        }
        .search-bar i {
            color: #4dd0e1;
            margin-right: 12px;
            font-size: 18px;
        }
        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }
        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .filter-btn {
            margin-left: 20px;
            padding: 12px 18px;
            background: rgba(11, 34, 51, 0.6);
            border: 2px solid #00b4d8;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .filter-btn:hover {
            border-color: #4dd0e1;
            box-shadow: 0 0 20px rgba(77, 208, 225, 0.3);
            background: rgba(11, 34, 51, 0.8);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #00b4d8, #0088a0);
            color: #fff;
            border-color: #4dd0e1;
        }
        /* Filter Groups */
        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 180, 216, 0.08) 0%, rgba(0, 180, 216, 0.03) 100%);
            margin: 20px auto;
            max-width: 1200px;
            border-radius: 12px;
            border: 1px solid rgba(0, 180, 216, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .filter-group label {
            color: #4dd0e1;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-option {
            padding: 8px 14px;
            background: rgba(11, 34, 51, 0.5);
            border: 2px solid rgba(0, 180, 216, 0.4);
            border-radius: 6px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .filter-option:hover {
            border-color: #4dd0e1;
            background: rgba(15, 56, 71, 0.8);
            box-shadow: 0 0 15px rgba(77, 208, 225, 0.2);
        }
        .filter-option.active {
            background: linear-gradient(135deg, #00b4d8, #0088a0);
            color: #fff;
            border-color: #4dd0e1;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
        }
        /* SPECIES COUNT */
        #species-count {
            text-align: center;
            font-size: 1.1em;
            color: #4dd0e1;
            margin-bottom: 20px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            padding: 0 3vw 60px 3vw;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .shark-card {
            width: 220px;
            height: 320px;
            margin: 0 auto;
            background: none;
            border: none;
            outline: none;
            perspective: 1400px;
            transition: box-shadow 0.18s cubic-bezier(.4,2,.6,1), transform 0.18s cubic-bezier(.4,2,.6,1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7), 0 2px 8px rgba(0, 180, 216, 0.3);
            border-radius: 16px;
            position: relative;
            will-change: box-shadow, transform;
            z-index: 1;
        }
        .shark-card:focus-visible {
            outline: 3px solid #4dd0e1;
            outline-offset: 2px;
        }
        .shark-card:hover:not(.flipped) {
            transform: scale(1.048) translateY(-8px);
            box-shadow: 0 16px 56px rgba(77, 208, 225, 0.4), 0 3px 12px rgba(0, 0, 0, 0.8);
        }
        .shark-card.flipped {
            transform: none;
            z-index: 10;
        }
        .heart-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 2;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .heart-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.15);
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
        }
        .heart-btn.hearted {
            background: rgba(255, 0, 0, 0.75);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.5);
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.7s cubic-bezier(.4,2,.6,1);
            transform-style: preserve-3d;
            will-change: transform;
            border-radius: 16px;
            box-shadow: 0 2px 24px rgba(0, 180, 216, 0.15) inset;
            background: none;
        }
        .shark-card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 22px 32px 22px;
            border: 2px solid rgba(0, 180, 216, 0.6);
            box-shadow: 0 2px 24px rgba(0, 180, 216, 0.2) inset, 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .card-front {
            z-index: 2;
            background: linear-gradient(135deg, #0a1f2e 0%, #0b2233 60%, rgba(0, 180, 216, 0.15) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card-front .shark-name {
            font-size: 1.6em;
            font-weight: 700;
            color: #4dd0e1;
            text-shadow: 0 3px 12px rgba(0, 180, 216, 0.4), 0 1px 0 rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 100%;
            line-height: 1.25;
            letter-spacing: 0.5px;
            word-wrap: break-word;
        }
        .card-back {
            z-index: 1;
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #0a1f2e 0%, #0f3847 50%, #00b4d8 100%);
            color: #fff;
            font-size: 0.95em;
            justify-content: flex-start;
            padding: 20px 18px;
            overflow-y: auto;
            align-items: flex-start;
        }
        .card-back .stat {
            margin: 6px 0;
            font-size: 0.9em;
            letter-spacing: 0.3px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .card-back .stat strong {
            color: #4dd0e1;
            font-weight: 700;
            letter-spacing: 0.3px;
            font-size: 0.95em;
            display: block;
            text-transform: uppercase;
            opacity: 0.95;
        }
        .card-back .stat small {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85em;
            font-weight: 500;
            padding-left: 4px;
            border-left: 2px solid rgba(77, 208, 225, 0.5);
            display: block;
            opacity: 0.9;
        }
        /* Scrollbar styling for card-back */
        .card-back::-webkit-scrollbar {
            width: 6px;
        }
        .card-back::-webkit-scrollbar-track {
            background: rgba(0, 180, 216, 0.1);
            border-radius: 10px;
        }
        .card-back::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4dd0e1, #00b4d8);
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(77, 208, 225, 0.4);
        }
        .card-back::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #5de4f0, #00d4ff);
            box-shadow: 0 0 12px rgba(77, 208, 225, 0.6);
        }
        /* Firefox scrollbar */
        .card-back {
            scrollbar-color: #4dd0e1 rgba(0, 180, 216, 0.1);
            scrollbar-width: thin;
        }
        .order-section {
            margin-bottom: 36px;
            background: linear-gradient(135deg, rgba(11, 34, 51, 0.6) 0%, rgba(0, 180, 216, 0.05) 100%);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid rgba(0, 180, 216, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
        }
        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 22px 36px 22px 28px;
            font-size: 1.3em;
            font-weight: 700;
            color: #4dd0e1;
            background: linear-gradient(90deg, rgba(15, 45, 68, 0.8) 80%, rgba(0, 180, 216, 0.1) 100%);
            border: none;
            outline: none;
            transition: all 0.3s;
            user-select: none;
        }
        .order-header:hover, .order-header:focus {
            background: linear-gradient(90deg, rgba(15, 45, 68, 1) 60%, rgba(0, 180, 216, 0.2) 100%);
        }
        .order-arrow {
            font-size: 1.2em;
            margin-left: 18px;
            transition: transform 0.3s;
        }
        .order-section.collapsed .order-arrow {
            transform: rotate(-90deg);
        }
        .order-content {
            padding: 0 18px 18px 18px;
            display: block;
            animation: fadeIn 0.4s;
        }
        .order-section.collapsed .order-content {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #4dd0e1;
            font-size: 1.2em;
        }
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 15px;
                gap: 8px;
            }
            .navbar-logo {
                font-size: 22px;
                flex: 0 0 auto;
            }
            .navbar > div:last-child {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px;
            }
            .nav-btn {
                flex: 1;
                min-width: 45px;
                padding: 6px 4px;
                font-size: 9px;
                margin-left: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                line-height: 1;
            }
            .nav-btn i {
                font-size: 14px;
            }
            .nav-btn span {
                font-size: 8px;
            }
            h1 { 
                font-size: 2.2em; 
                margin: 30px 0 10px 0;
            }
            .search-bar {
                max-width: 95%;
                min-width: 200px;
            }
            .filters-container {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
                margin: 20px 15px;
            }
            .filter-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                width: 100%;
            }
            .filter-buttons {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .filter-option {
                flex: 1;
                min-width: 70px;
                padding: 8px 10px;
                font-size: 12px;
            }
            .gallery {
                padding: 0 1vw 30px 1vw;
                gap: 12px;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            }
            .shark-card, .card-inner {
                height: 210px;
            }
            .card-front, .card-back {
                padding: 14px 8px 10px 8px;
                font-size: 0.9em;
            }
        }
        @media (max-width: 600px) {
            .navbar {
                padding: 10px 12px;
                gap: 6px;
                flex-direction: row;
                align-items: center;
            }
            .navbar-logo {
                font-size: 18px;
                flex-shrink: 0;
            }
            .navbar > div:last-child {
                display: flex;
                flex-direction: row;
                gap: 3px;
                flex-wrap: nowrap;
                min-width: 0;
            }
            .navbar a {
                margin-left: 0;
                font-size: 13px;
            }
            .nav-btn {
                min-height: 36px;
                font-size: 8px;
                padding: 4px 6px;
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                line-height: 1;
            }
            .nav-btn i {
                font-size: 12px;
            }
            .nav-btn span {
                font-size: 8px;
            }
            .filters-container {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
                margin: 15px;
            }
            .filter-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                width: 100%;
            }
            .filter-buttons {
                width: 100%;
            }
            .filter-option {
                flex: 1;
                min-width: 65px;
            }
            h1 { 
                font-size: 1.8em; 
                margin: 20px 0 10px 0; 
            }
            .search-bar {
                max-width: 90%;
            }
            .filter-btn {
                margin-left: 0;
                margin-top: 10px;
            }
            .search-container {
                flex-direction: column;
                gap: 12px;
            }
            .gallery {
                padding: 0 1vw 30px 1vw;
                gap: 10px;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            .shark-card, .card-inner {
                width: 98vw;
                max-width: 170px;
                height: 200px;
                min-height: 0;
            }
            .card-front .shark-name {
                font-size: 1.1em;
            }
            .card-front, .card-back {
                padding: 16px 6px 12px 6px;
                font-size: 0.95em;
                border-radius: 12px;
            }
            .card-back {
                padding: 14px 8px 10px 8px;
            }
            .card-back .stat {
                margin: 4px 0;
                font-size: 0.85em;
            }
            .order-section {
                margin-bottom: 18px;
                border-radius: 12px;
            }
            .order-header {
                padding: 12px 16px 12px 12px;
                font-size: 1.1em;
                border-radius: 0;
            }
            .order-arrow {
                font-size: 1em;
                margin-left: 10px;
            }
            .order-content {
                padding: 0 6px 8px 6px;
            }
        }
        @media (max-width: 480px) {
            .navbar {
                flex-direction: row;
                align-items: center;
                padding: 10px 12px;
                gap: 8px;
                justify-content: space-between;
            }
            .navbar-logo {
                font-size: 18px;
                flex-shrink: 0;
            }
            .navbar > div:last-child {
                display: flex;
                flex-direction: row;
                gap: 3px;
                flex-wrap: nowrap;
                min-width: 0;
            }
            .nav-btn {
                padding: 4px 6px;
                min-height: 32px;
                font-size: 8px;
                margin-left: 0;
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                line-height: 1;
            }
            .nav-btn i {
                font-size: 12px;
            }
            .nav-btn span {
                font-size: 8px;
            }
            h1 { 
                font-size: 1.5em; 
                margin: 15px 0 8px 0;
            }
            .search-bar {
                max-width: 95%;
                min-width: 150px;
                padding: 8px 12px;
            }
            .search-bar input {
                font-size: 14px;
            }
            .filter-btn {
                width: 100%;
                margin-left: 0;
                min-height: 40px;
            }
            .filters-container {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
                margin: 12px;
            }
            .filter-group {
                width: 100%;
            }
            .filter-buttons {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .filter-option {
                flex: 1;
                min-width: 60px;
                padding: 6px 8px;
                font-size: 11px;
                min-height: 36px;
            }
            .search-container {
                flex-direction: column;
                gap: 10px;
            }
            .gallery {
                padding: 0 8px 30px 8px;
                gap: 8px;
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            }
            .shark-card, .card-inner {
                max-width: 140px;
                height: 150px;
            }
            .card-front .shark-name {
                font-size: 0.95em;
            }
            .card-front, .card-back {
                font-size: 0.85em;
            }
            .card-back .stat {
                font-size: 0.8em;
                margin: 3px 0;
            }
            .order-section {
                margin: 10px 0;
                border-radius: 8px;
            }
            .order-header {
                padding: 10px 12px;
                font-size: 1em;
                min-height: 40px;
                display: flex;
                align-items: center;
            }
            .order-content {
                padding: 0 8px 6px 8px;
            }
        }
        @media (max-width: 400px) {
            .shark-card, .card-inner {
                max-width: 125px;
                height: 140px;
            }
            .card-front .shark-name {
                font-size: 0.9em;
            }
            .card-back .stat {
                font-size: 0.8em;
                margin: 3px 0;
            }
        }
        /* Touch-friendly tweaks */
        .shark-card { touch-action: manipulation; }
        .order-header { touch-action: manipulation; min-height: 44px; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-logo">🦈 Sharkdle</div>
        <div>
            <button onclick="navigate('index.html')" class="nav-btn" title="Home"><i class="fas fa-home"></i><span> Home</span></button>
            <button onclick="navigate('sharkpass.html')" class="nav-btn" title="Shark Pass"><i class="fas fa-id-card"></i><span> Pass</span></button>
            <button onclick="navigate('leaderboards.html')" class="nav-btn" title="Leaderboards"><i class="fas fa-ranking-star"></i><span> Board</span></button>
            <button onclick="navigate('achievements.html')" class="nav-btn" title="Achievements"><i class="fas fa-trophy"></i><span> Achieve</span></button>
        </div>
    </header>
    
    <h1>Shark Library</h1>
    
    <div class="search-container">
        <div class="search-bar">
            🔍
            <input 
                type="text" 
                id="shark-search" 
                placeholder="Search sharks by name, family, or order..."
            >
        </div>
        <button id="heart-filter" class="filter-btn" title="Show only hearted sharks">❤️ Show Favorites</button>
    </div>

    <!-- Size and Depth Filters -->
    <div class="filters-container">
        <div class="filter-group">
            <label>Size:</label>
            <div class="filter-buttons">
                <button class="filter-option" data-filter="size" data-value="Tiny">Tiny (0-3FT)</button>
                <button class="filter-option" data-filter="size" data-value="Small">Small (3-6FT)</button>
                <button class="filter-option" data-filter="size" data-value="Medium">Medium (6-10FT)</button>
                <button class="filter-option" data-filter="size" data-value="Large">Large (10-20FT)</button>
                <button class="filter-option" data-filter="size" data-value="Giant">Giant (20FT+)</button>
                <button class="filter-option clear-size" data-filter="size" data-value="">Clear</button>
            </div>
        </div>
        <div class="filter-group">
            <label>Depth:</label>
            <div class="filter-buttons">
                <button class="filter-option" data-filter="habitat" data-value="Epipelagic">Epipelagic (0-200m)</button>
                <button class="filter-option" data-filter="habitat" data-value="Mesopelagic">Mesopelagic (200-1000m)</button>
                <button class="filter-option" data-filter="habitat" data-value="Bathypelagic">Bathypelagic (1000-4000m)</button>
                <button class="filter-option clear-habitat" data-filter="habitat" data-value="">Clear</button>
            </div>
        </div>
    </div>
    
    <div id="species-count"></div>
    <div id="orders-container"></div>
    <div id="no-results" class="no-results" style="display:none;">No sharks found matching your search.</div>
    <!-- Shark list -->
    <script src="sharks.js"></script>
    <script>
        function navigate(page) {
            window.location.href = page;
        }

        let allSharks = [];
        let filteredSharks = [];
        let heartedSharks = new Set();
        let collapsedSections = new Set();
        let showOnlyHearted = false;
        let activeFilters = {
            size: null,
            habitat: null
        };

        // Common names mapping for orders and families
        const common_names = [
            // Orders
            {"scientific": "Carcharhiniformes", "Common": "Ground Sharks"},
            {"scientific": "Orectolobiformes", "Common": "Carpet Sharks"},
            {"scientific": "Lamniformes", "Common": "Mackerel Sharks"},
            {"scientific": "Heterodontiformes", "Common": "Bullhead Sharks"},
            {"scientific": "Squatiniformes", "Common": "Angel Sharks"},
            {"scientific": "Pristiophoriformes", "Common": "Saw Sharks"},
            {"scientific": "Squaliformes", "Common": "Dog Sharks"},
            {"scientific": "Hexanchiformes", "Common": "Cow and Frilled Sharks"},
            // Families
            {"scientific": "Sphyrnidae", "Common": "Hammerhead Sharks"},
            {"scientific": "Carcharhinidae", "Common": "Requiem Sharks"},
            {"scientific": "Stegostinatidae", "Common": "Zebra Sharks"},
            {"scientific": "Rhincodontidae", "Common": "Whale Sharks"},
            {"scientific": "Orectolobidae", "Common": "Wobbegong Sharks"},
            {"scientific": "Hemiscylliidae", "Common": "Bamboo Sharks"},
            {"scientific": "Ginglymostomatidae", "Common": "Nurse Sharks"},
            {"scientific": "Dalatiidae", "Common": "Kitefin Sharks"},
            {"scientific": "Etmopteridae", "Common": "Lantern Sharks"},
            {"scientific": "Echinorhinidae", "Common": "Bramble Sharks"},
            {"scientific": "Odontaspididae", "Common": "Sand Tiger Sharks"},
            {"scientific": "Megachasmidae", "Common": "Megamouth Sharks"},
            {"scientific": "Lamnidae", "Common": "Mackerel Sharks"},
            {"scientific": "Hexanchidae", "Common": "Cow Sharks"},
            {"scientific": "Centrophoridae", "Common": "Gulper Sharks"},
            {"scientific": "Pristiophoridae", "Common": "Saw Sharks"},
            {"scientific": "Squatinidae", "Common": "Angel Sharks"},
            {"scientific": "Heterodontidae", "Common": "Bullhead Sharks"},
            {"scientific": "Alopiidae", "Common": "Thresher Sharks"},
            {"scientific": "Cetorhinidae", "Common": "Basking Sharks"},
            {"scientific": "Mitsukurinidae", "Common": "Goblin Sharks"},
            {"scientific": "Brachaeluridae", "Common": "Blind Sharks"},
            {"scientific": "Chlamydoselachidae", "Common": "Frilled Sharks"},
            {"scientific": "Pseudocarchariidae", "Common": "Crocodile Sharks"},
            {"scientific": "Somniosidae", "Common": "Sleeper Sharks"},
            {"scientific": "Pentachidae", "Common": "Deep-Sea CatSharks"},
        ];

        function getCommonName(scientificName) {
            const entry = common_names.find(cn => cn.scientific === scientificName);
            return entry ? entry.Common : null;
        }

        // Size category mapping to actual shark data values
        function mapSizeCategoryToDataValues(category) {
            const sizeMapping = {
                'Tiny': ['Tiny'],      // Tiny sharks
                'Small': ['Small'],     // Small sharks
                'Medium': ['Medium'],   // Medium sharks
                'Large': ['Large'],     // Large sharks
                'Giant': ['Giant']      // Giant sharks
            };
            return sizeMapping[category] || [];
        }

        // Get size threshold display text for card
        function getSizeThreshold(sharkSize) {
            const thresholds = {
                'Tiny': 'Tiny (0-3 FT)',
                'Small': 'Small (3-6 FT)',
                'Medium': 'Medium (6-10 FT)',
                'Large': 'Large (10-20 FT)',
                'Giant': 'Giant (20+ FT)'
            };
            return thresholds[sharkSize] || sharkSize;
        }

        // Get habitat display text for card
        function getHabitatDisplay(habitat) {
            const habitatDisplay = {
                'Epipelagic': 'Epipelagic (0-200m)',
                'Mesopelagic': 'Mesopelagic (200-1000m)',
                'Bathypelagic': 'Bathypelagic (1000-4000m)',
                'Tropical': 'Tropical (Coastal/Surface)'
            };
            return habitatDisplay[habitat] || habitat;
        }

        function loadHeartedSharks() {
            const stored = localStorage.getItem('heartedSharks');
            if (stored) {
                heartedSharks = new Set(JSON.parse(stored));
            }
        }

        function saveHeartedSharks() {
            localStorage.setItem('heartedSharks', JSON.stringify([...heartedSharks]));
        }

        function loadCollapsedSections() {
            // Don't load from localStorage - reset collapsed sections on page reload
            // This allows users to reset closed categories by refreshing the page
        }

        function saveCollapsedSections() {
            // Only keep in memory (not persisted to localStorage)
            // Collapsed sections reset when page is reloaded
        }

        function toggleHeart(sharkName) {
            if (heartedSharks.has(sharkName)) {
                heartedSharks.delete(sharkName);
            } else {
                heartedSharks.add(sharkName);
            }
            saveHeartedSharks();
            renderSharkGalleryByOrder();
        }

        function toggleHeartFilter() {
            showOnlyHearted = !showOnlyHearted;
            const filterBtn = document.getElementById('heart-filter');
            filterBtn.classList.toggle('active');
            filterBtn.textContent = showOnlyHearted ? '🦈 Show All' : '❤️ Show Favorites';
            const searchTerm = document.getElementById('shark-search').value;
            filterSharks(searchTerm);
        }

        function filterSharks(searchTerm) {
            const term = searchTerm.toLowerCase().trim();
            
            let baseSharks = [...allSharks];
            if (showOnlyHearted) {
                baseSharks = baseSharks.filter(shark => heartedSharks.has(shark.name));
            }
            
            // Apply size filter
            if (activeFilters.size) {
                const sizeValues = mapSizeCategoryToDataValues(activeFilters.size);
                if (sizeValues.length > 0) {
                    baseSharks = baseSharks.filter(shark => sizeValues.includes(shark.size));
                }
            }
            
            // Apply habitat filter
            if (activeFilters.habitat) {
                baseSharks = baseSharks.filter(shark => shark.habitat === activeFilters.habitat);
            }
            
            if (!term) {
                filteredSharks = baseSharks;
            } else {
                filteredSharks = baseSharks.filter(shark => 
                    shark.name.toLowerCase().includes(term) ||
                    shark.family.toLowerCase().includes(term) ||
                    shark.order.toLowerCase().includes(term) ||
                    shark.genus.toLowerCase().includes(term)
                );
            }
            
            renderSharkGalleryByOrder();
        }

        function renderSharkGalleryByOrder() {
            const noResults = document.getElementById('no-results');
            const ordersContainer = document.getElementById('orders-container');
            
            if (filteredSharks.length === 0) {
                noResults.style.display = 'block';
                ordersContainer.innerHTML = '';
                document.getElementById('species-count').textContent = '';
                return;
            }
            
            noResults.style.display = 'none';
            
            // Show species count
            document.getElementById('species-count').textContent = `Showing ${filteredSharks.length} shark${filteredSharks.length !== 1 ? 's' : ''}`;
            
            ordersContainer.innerHTML = '';
            const orderGroups = {};
            
            filteredSharks.forEach(shark => {
                if (!orderGroups[shark.order]) orderGroups[shark.order] = [];
                orderGroups[shark.order].push(shark);
            });
            
            const sortedOrders = Object.keys(orderGroups).sort();
            sortedOrders.forEach(order => {
                const section = document.createElement('section');
                section.className = 'order-section';
                if (collapsedSections.has(order)) {
                    section.classList.add('collapsed');
                }
                const header = document.createElement('button');
                header.className = 'order-header';
                header.type = 'button';
                header.innerHTML = `<span>${order}</span><span class="order-arrow">&#9660;</span>`;
                header.addEventListener('click', () => {
                    section.classList.toggle('collapsed');
                    if (section.classList.contains('collapsed')) {
                        collapsedSections.add(order);
                    } else {
                        collapsedSections.delete(order);
                    }
                    saveCollapsedSections();
                    // Update species count display when collapsing/expanding
                    const visibleSharks = filteredSharks.filter(shark => {
                        return !collapsedSections.has(shark.order);
                    });
                    document.getElementById('species-count').textContent = `Showing ${visibleSharks.length} shark${visibleSharks.length !== 1 ? 's' : ''}`;
                });
                section.appendChild(header);
                const content = document.createElement('div');
                content.className = 'order-content';
                const gallery = document.createElement('div');
                gallery.className = 'gallery';
                orderGroups[order].forEach((shark) => {
                    const card = document.createElement('div');
                    card.className = 'shark-card';
                    card.tabIndex = 0;
                    card.setAttribute('aria-label', `Shark card for ${shark.name}`);
                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="card-front">
                                <button class="heart-btn ${heartedSharks.has(shark.name) ? 'hearted' : ''}" data-shark="${shark.name}" title="Add to favorites">${heartedSharks.has(shark.name) ? '❤️' : '🤍'}</button>
                                <div class="shark-name">${shark.name}</div>
                            </div>
                            <div class="card-back">
                                <div class="stat"><strong>Name:</strong> ${shark.name}</div>
                                <div class="stat"><strong>Order:</strong> ${shark.order}${getCommonName(shark.order) ? `<br/><small>(${getCommonName(shark.order)})</small>` : ''}</div>
                                <div class="stat"><strong>Family:</strong> ${shark.family}${getCommonName(shark.family) ? `<br/><small>(${getCommonName(shark.family)})</small>` : ''}</div>
                                <div class="stat"><strong>Genus:</strong> ${shark.genus}</div>
                                <div class="stat"><strong>Size:</strong> ${getSizeThreshold(shark.size)}</div>
                                <div class="stat"><strong>Depth:</strong> ${getHabitatDisplay(shark.habitat)}</div>
                                <div class="stat"><strong>Year of Discovery:</strong> ${shark.yod}</div>
                            </div>
                        </div>
                    `;
                    // Add heart button event listener
                    const heartBtn = card.querySelector('.heart-btn');
                    heartBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleHeart(shark.name);
                    });
                    card.addEventListener('click', () => {
                        card.classList.toggle('flipped');
                    });
                    card.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            card.classList.toggle('flipped');
                        }
                    });
                    gallery.appendChild(card);
                });
                content.appendChild(gallery);
                section.appendChild(content);
                ordersContainer.appendChild(section);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadHeartedSharks();
            loadCollapsedSections();
            allSharks = Array.isArray(sharks) ? [...sharks] : [];
            filteredSharks = [...allSharks];
            renderSharkGalleryByOrder();
            
            // Setup search listener
            const searchInput = document.getElementById('shark-search');
            searchInput.addEventListener('input', (e) => {
                filterSharks(e.target.value);
            });
            
            // Setup heart filter listener
            const filterBtn = document.getElementById('heart-filter');
            filterBtn.addEventListener('click', toggleHeartFilter);
            
            // Setup size and habitat filter listeners
            const filterOptions = document.querySelectorAll('.filter-option');
            filterOptions.forEach(button => {
                button.addEventListener('click', function() {
                    const filterType = this.getAttribute('data-filter');
                    const filterValue = this.getAttribute('data-value');
                    
                    // Update active filters
                    activeFilters[filterType] = filterValue || null;
                    
                    // Update button states
                    const sameTypeButtons = document.querySelectorAll(`[data-filter="${filterType}"]`);
                    sameTypeButtons.forEach(btn => {
                        if (btn.getAttribute('data-value') === filterValue && filterValue) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });
                    
                    // Re-filter based on search input
                    const searchInput = document.getElementById('shark-search');
                    filterSharks(searchInput.value);
                });
            });
        });
    </script>
</body>
</html>
