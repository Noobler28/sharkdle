<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shark Pass</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>


<body class="sharkpass-page">

<header class="navbar">

<div class="logo">
🦈 Sharkdle
</div>

<nav>

<button onclick="navigate('index.html')" class="nav-btn">Home</button>
<button onclick="navigate('library.html')" class="nav-btn">Library</button>
<button onclick="navigate('leaderboards.html')" class="nav-btn">Leaderboards</button>
<button onclick="navigate('achievements.html')" class="nav-btn">Achievements</button>

</nav>

</header>


<main class="sharkpass-container">

<!-- PAGE TITLE -->

<div class="pass-header">

<h1>
<i class="fas fa-id-card"></i> Shark Pass
</h1>

<p>
<p style="text-align: center;">
Earn XP by playing Sharkdle and unlock special profile pictures.
</p>
</p>

</div>

<!-- XP PROGRESS -->

<section class="xp-section">

<div class="level-info">

Level <span id="current-level">1</span>

</div>

<div class="xp-bar-container">

<div class="xp-bar-fill" id="xp-bar-fill"></div>

<div class="xp-text" style="text-align:center;">

XP: <span id="current-xp">0</span> / <span id="xp-to-next">0</span>

</div>

</div>

</section>


<!-- REWARDS -->

<section class="rewards-section">

<h2>🎁 Rewards</h2>

<div class="level-grid" id="level-pfp-grid">

<!-- rewards generated by sharkpass.js -->

</div>

</section>

</main>


<!-- OPTIONS MODAL -->

<div id="optionsModal" class="modal hidden">

<div class="modal-content">

<h2>Options</h2>

<button onclick="toggleTheme()">Toggle Theme</button>

<button onclick="closeOptions()">Close</button>

</div>

</div>


<script src="script.js"></script>
<script src="sharkpass.js"></script>


<script>

document.addEventListener('DOMContentLoaded', function() {
	const streak = localStorage.getItem("loginStreak") || 0;
	const loginInfo = document.getElementById('login-streak');
	if (loginInfo && streak > 0) {
		loginInfo.innerHTML =
		`🔥 Current Streak: <strong>${streak} days</strong><br>
		Daily XP: 50 + (${streak} × 10) = <strong>${50 + (streak * 10)}</strong> XP`;
	}

});

</script>


</body>
</html>
